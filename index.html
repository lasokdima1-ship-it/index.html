<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АлкоДоставка • Україна</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
        }
        .product-card { 
            transition: all 0.3s; 
        }
        .product-card:hover { 
            transform: translateY(-6px); 
            box-shadow: 0 15px 20px -5px rgb(0 0 0 / 0.1); 
        }
        .product-img {
            height: 170px;
            object-fit: contain;
            background: #18181b;
            padding: 12px;
            border-bottom: 1px solid #27272a;
        }

        /* Hamburger */
        .hamburger span {
            transition: all 0.3s ease;
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

        /* Міні-кошик */
        #mini-cart {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #mini-cart.hidden {
            transform: translateY(150%);
        }
    </style>
</head>

                <nav class="hidden md:flex items-center gap-8 text-sm">
                    <a onclick="showSection('catalog')" class="cursor-pointer hover:text-amber-400 transition-colors">Каталог</a>

                        Кошик <span id="cart-count" class="bg-amber-500 text-black px-2.5 py-0.5 rounded-full text-xs font-bold">0</span>

                    <button id="hamburger-btn" onclick="toggleMobileMenu()"

            </div>
        </div>
    </header>

    <!-- HERO -->

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 sm:gap-6" id="products"></div>

            <form id="order-form" onsubmit="submitOrder(event)">

                    <input id="name" type="text" placeholder="Ім'я Прізвище" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-base">

                        <input id="telegram" type="text" placeholder="@username" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-base">

                    <textarea id="address" rows="3" placeholder="Адреса доставки" required class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-4 text-base"></textarea>
                    <input id="comment" type="text" placeholder="Коментар" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-base">

    </div>

    <!-- MINI CART -->

            <div class="flex items-center gap-3">

                <div>

                    <p id="mini-count" class="text-sm text-zinc-400">0 товарів</p>
                </div>
            </div>
            <div>

            </div>
            <button onclick="hideMiniCart()" class="text-zinc-400 hover:text-white text-3xl leading-none px-2">×</button>
        </div>
        <div class="p-4 flex gap-3">

        let cart = [];
        let filter = "all";

        function renderFilters() {
            const cats = ["all", ...new Set(products.map(p => p.cat))];
            let html = `<button onclick="setFilter('all')" class="px-6 py-3 rounded-3xl whitespace-nowrap text-sm ${filter==='all' ? 'bg-amber-500 text-black' : 'bg-zinc-800 hover:bg-zinc-700'}">Всі (${products.length})</button>`;
            cats.forEach(c => {
                if (c !== "all") {
                    html += `<button onclick="setFilter('${c}')" class="px-6 py-3 rounded-3xl whitespace-nowrap text-sm ${filter===c ? 'bg-amber-500 text-black' : 'bg-zinc-800 hover:bg-zinc-700'}">${c}</button>`;
                }
            });
            document.getElementById("filters").innerHTML = html;
        }

        function renderProducts() {
            const filtered = filter === "all" ? products : products.filter(p => p.cat === filter);
            let html = "";
            filtered.forEach(p => {
                html += `
                <div class="product-card bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800">
                    <img src="${p.img}" class="product-img w-full" alt="${p.name}" onerror="this.src='https://source.unsplash.com/random/600x600/?alcohol-bottle';">
                    <div class="p-4">
                        <div class="font-semibold text-base leading-tight">${p.name}</div>
                        <div class="text-sm text-zinc-400 mt-1">${p.vol}</div>
                        <div class="flex justify-between items-end mt-5">
                            <div>
                                <span class="text-2xl font-bold">${p.price}</span>
                                <span class="text-sm text-zinc-400"> грн</span>
                            </div>
                            <button onclick="addToCart(${p.id}); event.stopImmediatePropagation()" 
                                    class="bg-amber-500 hover:bg-amber-600 text-black px-5 py-2.5 rounded-2xl text-sm font-semibold transition">
                                В кошик
                            </button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById("products").innerHTML = html || "<p class='col-span-full text-center text-zinc-400 py-12'>Немає товарів</p>";
        }

        function setFilter(f) {
            filter = f;
            renderFilters();
            renderProducts();
        }

        function addToCart(id) {
            const prod = products.find(p => p.id === id);
            const exist = cart.find(item => item.id === id);
            if (exist) exist.qty = (exist.qty || 1) + 1;
            else cart.push({...prod, qty: 1});

            updateCartCount();
            showMiniCart();   // Показуємо міні-кошик
        }

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
            document.getElementById("cart-count").textContent = count;
            const mobileCount = document.getElementById("mobile-cart-count");
            if (mobileCount) mobileCount.textContent = count;
        }

        function showMiniCart() {
            const mini = document.getElementById("mini-cart");
            const total = cart.reduce((sum, item) => sum + item.price * (item.qty || 1), 0);
            const count = cart.reduce((sum, item) => sum + (item.qty || 1), 0);

            document.getElementById("mini-total").textContent = total + " грн";
            document.getElementById("mini-count").textContent = `${count} товар${count % 10 === 1 && count % 100 !== 11 ? '' : 'ів'}`;

            mini.classList.remove("hidden");
        }

        function hideMiniCart() {
            document.getElementById("mini-cart").classList.add("hidden");
        }

        function renderCart() {
            let html = "", total = 0;
            cart.forEach((item, i) => {
                const sum = item.price * (item.qty || 1);
                total += sum;
                html += `
                <div class="flex gap-4 bg-zinc-900 p-5 rounded-3xl">
                    <img src="${item.img}" class="w-20 h-20 object-contain rounded-xl" onerror="this.src='https://source.unsplash.com/random/600x600/?alcohol-bottle';">
                    <div class="flex-1 min-w-0">
                        <div class="font-semibold text-base leading-tight">${item.name} ${item.vol}</div>
                        <div class="text-amber-400 text-sm mt-1">${item.price} грн × ${item.qty || 1}</div>
                    </div>
                    <div class="text-right flex-shrink-0">
                        <div class="font-bold text-lg">${sum} грн</div>
                        <div class="mt-3 flex items-center justify-end gap-3">
                            <button onclick="changeQty(${i}, -1)" class="text-red-400 text-2xl w-7 h-7 flex items-center justify-center">-</button>
                            <span class="text-lg w-6 text-center">${item.qty || 1}</span>
                            <button onclick="changeQty(${i}, 1)" class="text-emerald-400 text-2xl w-7 h-7 flex items-center justify-center">+</button>
                            <button onclick="removeFromCart(${i})" class="ml-4 text-red-500 text-3xl leading-none">×</button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById("cart-items").innerHTML = html || "<p class='text-zinc-400 text-center py-12'>Кошик порожній</p>";
            document.getElementById("total").textContent = total + " грн";
        }

        function changeQty(i, delta) {
            cart[i].qty = (cart[i].qty || 1) + delta;
            if (cart[i].qty < 1) cart.splice(i, 1);
            renderCart();
            updateCartCount();
            if (cart.length === 0) hideMiniCart();
        }

        function removeFromCart(i) {
            cart.splice(i, 1);
            renderCart();
            updateCartCount();
            if (cart.length === 0) hideMiniCart();
        }

        function showSection(sec) {
            document.getElementById("catalog").classList.add("hidden");
            document.getElementById("cart").classList.add("hidden");
            document.getElementById(sec).classList.remove("hidden");
            if (sec === "cart") {
                renderCart();
                hideMiniCart();   // ховаємо міні-кошик при відкритті повного
            }
        }

        function toggleMobileMenu() {
            const menu = document.getElementById("mobile-menu");
            const btn = document.getElementById("hamburger-btn");
            menu.classList.toggle("hidden");
            btn.classList.toggle("active");
        }

        function openOrderModal() {
            if (cart.length === 0) return alert("Кошик порожній");
            document.getElementById("order-modal").classList.remove("hidden");
        }

        function submitOrder(e) {
            e.preventDefault();
            const name = document.getElementById("name").value;
            const phone = document.getElementById("phone").value;
            const tg = document.getElementById("telegram").value || "—";
            const address = document.getElementById("address").value;
            const comment = document.getElementById("comment").value || "—";

            let orderText = `🛒 Нове замовлення!\n\nІм'я: ${name}\nТел: ${phone}\nTelegram: ${tg}\nАдреса: ${address}\nКоментар: ${comment}\n\n`;
            let total = 0;
            cart.forEach(item => {
                const sum = item.price * (item.qty || 1);
                total += sum;
                orderText += `${item.name} ${item.vol} × ${item.qty || 1} = ${sum} грн\n`;
            });
            orderText += `\nРазом: ${total} грн\nДоставка: безкоштовно`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: CHAT_ID, text: orderText })
            }).catch(() => {});

            setTimeout(() => window.location.href = "https://t.me/founderAD", 800);
        }

        // Запуск
        renderFilters();
        renderProducts();
        updateCartCount();
    </script>
</body>
</html>
