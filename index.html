<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АлкоДоставка • Україна</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .product-card { transition: all 0.3s; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .product-img {
            height: 200px;
            object-fit: contain;
            background: #18181b;
            padding: 15px;
            border-bottom: 1px solid #27272a;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <header class="sticky top-0 z-50 bg-black border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-amber-500 rounded-2xl flex items-center justify-center text-3xl">🍾</div>
                <div>
                    <h1 class="text-3xl font-bold">АлкоДоставка</h1>
                    <p class="text-amber-400 text-sm">312 позицій • Доставка по Україні</p>
                </div>
            </div>
            <nav class="flex items-center gap-8">
                <a onclick="showSection('catalog')" class="cursor-pointer hover:text-amber-400">Каталог</a>
                <a onclick="showSection('cart')" class="cursor-pointer flex items-center gap-2 hover:text-amber-400">
                    Кошик <span id="cart-count" class="bg-amber-500 text-black px-2 py-0.5 rounded-full text-xs font-bold">0</span>
                </a>
                <a href="https://t.me/founderAD" target="_blank" class="bg-amber-500 text-black px-6 py-3 rounded-2xl font-semibold flex items-center gap-2">
                    <i class="fab fa-telegram"></i> TELEGRAM
                </a>
            </nav>
        </div>
    </header>

    <div class="bg-gradient-to-br from-zinc-900 to-black py-16 text-center">
        <h2 class="text-5xl font-bold tracking-tight">Популярний алкоголь</h2>
        <p class="mt-4 text-2xl text-zinc-400">312 позицій • алкоголю</p>
    </div>

    <section id="catalog" class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex flex-wrap gap-3 mb-8" id="filters"></div>
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6" id="products"></div>
    </section>

    <section id="cart" class="max-w-7xl mx-auto px-6 py-12 hidden">
        <h2 class="text-4xl font-bold mb-8">Кошик</h2>
        <div id="cart-items" class="space-y-6"></div>
        <div class="bg-zinc-900 p-8 rounded-3xl max-w-md ml-auto mt-10">
            <div class="flex justify-between text-2xl mb-6">
                <span>Разом:</span>
                <span id="total" class="font-semibold">0 грн</span>
            </div>
            <button onclick="openOrderModal()" class="w-full bg-amber-500 text-black py-6 rounded-3xl text-2xl font-semibold">Оформити замовлення</button>
            <p class="text-center text-sm text-emerald-400 mt-4">Доставка безкоштовна від 1000 грн</p>
        </div>
    </section>

    <div id="order-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl p-8 max-w-lg w-full mx-4">
            <h3 class="text-3xl font-bold mb-6">Оформлення замовлення</h3>
            <form id="order-form" onsubmit="submitOrder(event)">
                <div class="space-y-5">
                    <input id="name" type="text" placeholder="Ім'я Прізвище" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                    <div class="grid grid-cols-2 gap-5">
                        <input id="phone" type="tel" placeholder="+380 (__) ___-__-__" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                        <input id="telegram" type="text" placeholder="@username" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                    </div>
                    <textarea id="address" rows="3" placeholder="Адреса доставки" required class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-4"></textarea>
                    <input id="comment" type="text" placeholder="Коментар" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                    <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-black py-6 rounded-3xl text-2xl font-semibold">Надіслати замовлення</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8241760623:AAGfnf7OqvVPcnkW_EM5r3zgXN1blNZQ4Ig";
        let CHAT_ID = "твій_chat_id";   // ← ОБОВ'ЯЗКОВО ЗАМІНИ НА СВІЙ CHAT ID!

        const products = [
      // ГОРІЛКА
{id:1, name:"Nemiroff Делікат", cat:"горілка", price:199, vol:"0.7л", img:"https://source.unsplash.com/600x600/?vodka,bottle,clear"},
{id:2, name:"Хортиця Класична", cat:"горілка", price:169, vol:"0.5л", img:"https://source.unsplash.com/600x600/?vodka,glass,bottle"},
{id:3, name:"Гетьман", cat:"горілка", price:189, vol:"0.7л", img:"https://source.unsplash.com/600x600/?vodka,drink"},

// ПИВО
{id:61, name:"Оболонь Світле", cat:"пиво", price:35, vol:"0.5л", img:"https://source.unsplash.com/600x600/?beer,bottle"},

{id:504, name:"Stella Artois", cat:"пиво", price:65, vol:"0.5л", img:"https://source.unsplash.com/600x600/?stella,beer"},

// ВИНО
{id:121, name:"Каберне", cat:"вино", price:149, vol:"0.75л", img:"https://source.unsplash.com/600x600/?red,wine,bottle"},

{id:401, name:"Каберне Совіньйон Франція", cat:"вино", price:279, vol:"0.75л", img:"https://source.unsplash.com/600x600/?cabernet,wine"},
{id:402, name:"Шардоне Бургундія", cat:"вино", price:319, vol:"0.75л", img:"https://source.unsplash.com/600x600/?chardonnay"},
{id:403, name:"Мерло Італія", cat:"вино", price:249, vol:"0.75л", img:"https://source.unsplash.com/600x600/?merlot,wine"},
{id:404, name:"Піно Нуар", cat:"вино", price:359, vol:"0.75л", img:"https://source.unsplash.com/600x600/?pinot,noir"},
{id:405, name:"Совіньйон Блан", cat:"вино", price:289, vol:"0.75л", img:"https://source.unsplash.com/600x600/?sauvignon,blanc"},

// ІГРИСТЕ
{id:171, name:"Ігристе вино Біле", cat:"ігристе", price:189, vol:"0.75л", img:"https://source.unsplash.com/600x600/?champagne"},
{id:172, name:"Просекко", cat:"ігристе", price:399, vol:"0.75л", img:"https://source.unsplash.com/600x600/?prosecco"},

// РОМ
{id:211, name:"Captain Morgan", cat:"ром", price:499, vol:"0.7л", img:"https://source.unsplash.com/600x600/?rum,bottle"},
{id:212, name:"Bacardi Superior", cat:"ром", price:549, vol:"0.7л", img:"https://source.unsplash.com/600x600/?bacardi"},
{id:603, name:"Bacardi Black", cat:"ром", price:599, vol:"0.7л", img:"https://source.unsplash.com/600x600/?dark,rum"},
{id:604, name:"Havana Club", cat:"ром", price:649, vol:"0.7л", img:"https://source.unsplash.com/600x600/?cuban,rum"},

// ВІСКІ
{id:201, name:"Jameson", cat:"віскі", price:699, vol:"0.7л", img:"https://source.unsplash.com/600x600/?irish,whiskey"},
{id:202, name:"Jack Daniel's", cat:"віскі", price:799, vol:"0.7л", img:"https://images.washingtonpost.com/?url=http://img.washingtonpost.com/news/morning-mix/wp-content/uploads/sites/21/2016/06/Jack-Daniels-Tennessee-Whiskey.jpg&w=1484&op=resize&opt=1&filter=antialias"},
{id:703, name:"Johnnie Walker Black", cat:"віскі", price:899, vol:"0.7л", img:"https://tse2.mm.bing.net/th/id/OIP.CgXpB9FiBbGEE403U0jTWQHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"},
{id:704, name:"Chivas Regal", cat:"віскі", price:999, vol:"0.7л", img:"https://www.emporioaugusta.com.br/loja/image/cache/catalog/data/Whisky/chivas-12-1024x1024.jpg"},
{id:705, name:"Jim Beam", cat:"віскі", price:599, vol:"0.7л", img:"https://www.aklehr.com/wp-content/gallery/jim-beam/Jim-Beam_30.jpg"}          
];
        // Автодоповнення решти позицій до ~312
        for (let i = 213; i <= 312; i++) {
            let base = products[Math.floor(Math.random() * products.length)];
            products.push({
                id: i,
                name: base.name + (i % 5 === 0 ? " Premium" : ""),
                cat: base.cat,
                price: Math.floor(base.price * (0.85 + Math.random() * 0.5)),
                vol: base.vol,
                img: base.img
            });
        }

        let cart = [];
        let filter = "all";

        function renderFilters() {
            const cats = ["all", ...new Set(products.map(p => p.cat))];
            let html = `<button onclick="setFilter('all')" class="px-5 py-2 rounded-3xl ${filter==='all'?'bg-amber-500 text-black':'bg-zinc-800'}">Всі (${products.length})</button>`;
            cats.forEach(c => {
                if(c !== "all") html += `<button onclick="setFilter('${c}')" class="px-5 py-2 rounded-3xl ${filter===c?'bg-amber-500 text-black':'bg-zinc-800'}">${c}</button>`;
            });
            document.getElementById("filters").innerHTML = html;
        }

        function renderProducts() {
            const filtered = filter === "all" ? products : products.filter(p => p.cat === filter);
            let html = "";
            filtered.forEach(p => {
                html += `
                <div class="product-card bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800">
                    <img src="${p.img}" class="product-img w-full" alt="${p.name}" onerror="this.src='https://source.unsplash.com/random/600x600/?alcohol-bottle';">
                    <div class="p-4">
                        <div class="font-semibold text-lg">${p.name}</div>
                        <div class="text-sm text-zinc-400">${p.vol}</div>
                        <div class="flex justify-between items-end mt-4">
                            <div><span class="text-3xl font-bold">${p.price}</span><span class="text-sm"> грн</span></div>
                            <button onclick="addToCart(${p.id}); event.stopImmediatePropagation()" class="bg-amber-500 text-black px-6 py-2 rounded-2xl text-sm font-semibold">В кошик</button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById("products").innerHTML = html || "<p class='col-span-full text-center text-zinc-400 py-12'>Немає товарів</p>";
        }

        function setFilter(f) {
            filter = f;
            renderFilters();
            renderProducts();
        }

        function addToCart(id) {
            const prod = products.find(p => p.id === id);
            const exist = cart.find(item => item.id === id);
            if (exist) exist.qty = (exist.qty || 1) + 1;
            else cart.push({...prod, qty: 1});
            updateCartCount();
        }

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
            document.getElementById("cart-count").textContent = count;
        }

        function renderCart() {
            let html = "", total = 0;
            cart.forEach((item, i) => {
                const sum = item.price * (item.qty || 1);
                total += sum;
                html += `
                <div class="flex gap-4 bg-zinc-900 p-5 rounded-3xl">
                    <img src="${item.img}" class="w-20 h-20 object-contain" onerror="this.src='https://source.unsplash.com/random/600x600/?alcohol-bottle';">
                    <div class="flex-1">
                        <div class="font-semibold">${item.name} ${item.vol}</div>
                        <div class="text-amber-400">${item.price} грн × ${item.qty || 1}</div>
                    </div>
                    <div class="text-right">
                        <div class="font-bold">${sum} грн</div>
                        <button onclick="changeQty(${i}, -1)" class="text-red-400 text-xl">-</button>
                        <span class="mx-3 text-lg">${item.qty || 1}</span>
                        <button onclick="changeQty(${i}, 1)" class="text-emerald-400 text-xl">+</button>
                        <button onclick="removeFromCart(${i})" class="ml-6 text-red-500 text-2xl">×</button>
                    </div>
                </div>`;
            });
            document.getElementById("cart-items").innerHTML = html || "<p class='text-zinc-400 text-center py-8'>Кошик порожній</p>";
            document.getElementById("total").textContent = total + " грн";
        }

        function changeQty(i, delta) {
            cart[i].qty = (cart[i].qty || 1) + delta;
            if (cart[i].qty < 1) cart.splice(i, 1);
            renderCart();
            updateCartCount();
        }

        function removeFromCart(i) {
            cart.splice(i, 1);
            renderCart();
            updateCartCount();
        }

        function showSection(sec) {
            document.getElementById("catalog").classList.add("hidden");
            document.getElementById("cart").classList.add("hidden");
            document.getElementById(sec).classList.remove("hidden");
            if (sec === "cart") renderCart();
        }

        function openOrderModal() {
            if (cart.length === 0) return alert("Кошик порожній");
            document.getElementById("order-modal").classList.remove("hidden");
        }

        function submitOrder(e) {
            e.preventDefault();
            const name = document.getElementById("name").value;
            const phone = document.getElementById("phone").value;
            const tg = document.getElementById("telegram").value || "—";
            const address = document.getElementById("address").value;
            const comment = document.getElementById("comment").value || "—";

            let orderText = `🛒 Нове замовлення!\n\nІм'я: ${name}\nТел: ${phone}\nTelegram: ${tg}\nАдреса: ${address}\nКоментар: ${comment}\n\n`;
            let total = 0;
            cart.forEach(item => {
                const sum = item.price * (item.qty || 1);
                total += sum;
                orderText += `${item.name} ${item.vol} × ${item.qty || 1} = ${sum} грн\n`;
            });
            orderText += `\nРазом: ${total} грн\nДоставка: безкоштовно`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: CHAT_ID, text: orderText, parse_mode: "HTML" })
            }).catch(() => {});

            setTimeout(() => window.location.href = "https://t.me/founderAD", 800);
        }

        // Запуск
        renderFilters();
        renderProducts();
        updateCartCount();
    </script>
</body>
</html>
