<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АлкоДоставка • Преміум</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            font-family: 'Inter', system_ui, sans-serif; 
            background: #0a0a0a; 
            overflow-x: hidden; 
        }
        .product-card { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            background: #1a1a2e; 
        }
        .product-card:hover { 
            transform: translateY(-8px) scale(1.02); 
            box-shadow: 0 20px 40px -12px rgba(139, 92, 246, 0.35); 
        }
        .product-img { 
            height: 220px; 
            object-fit: contain; 
            background: #16213e; 
            padding: 20px; 
            border-radius: 20px; 
            transition: transform 0.5s ease; 
        }
        .product-card:hover .product-img { 
            transform: scale(1.08); 
        }

        .hero-bg { 
            background: linear-gradient(135deg, #4c1d95 0%, #1e1b4b 100%); 
        }

        .modal { 
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        @keyframes modalPop { 
            from { transform: scale(0.75) translateY(40px); opacity: 0; } 
            to { transform: scale(1) translateY(0); opacity: 1; } 
        }

        .floating-cart {
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            z-index: 999;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9); 
            color: white;
            width: 65px; 
            height: 65px; 
            border-radius: 9999px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 10px 20px -5px rgb(139 92 246 / 0.5); 
            font-size: 30px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">

    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-black/95 backdrop-blur-md border-b border-violet-900">

                    <div class="w-9 h-9 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-2xl flex items-center justify-center text-3xl shadow-lg">🍾</div>
                    <div>
                        <h1 class="text-2xl font-bold tracking-tight">АлкоДоставка</h1>

                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <!-- Маленька іконка Telegram -->
                    <a href="https://t.me/founderAD" target="_blank"

                        <i class="fab fa-telegram text-2xl"></i>
                    </a>
                    <button onclick="toggleMobileMenu()" class="w-10 h-10 flex flex-col items-center justify-center gap-1">

                        <span class="w-6 h-0.5 bg-white rounded block"></span>
                        <span class="w-6 h-0.5 bg-white rounded block"></span>
                    </button>
                </div>
            </div>
        </div>

                <a onclick="showSection('catalog'); toggleMobileMenu()" class="cursor-pointer hover:text-violet-400 px-2 py-2">Каталог</a>
                <a onclick="showSection('cart'); toggleMobileMenu()" class="cursor-pointer flex justify-between hover:text-violet-400 px-2 py-2">
                    Кошик

                </a>
            </div>
        </div>
    </header>

    <!-- HERO -->

        <div class="max-w-xl mx-auto">

        </div>

        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5" id="products"></div>
    </section>

    </section>

            <h3 class="text-3xl font-bold text-violet-300 mb-8">Оформлення замовлення</h3>
            
            <form id="order-form" onsubmit="submitOrder(event)">
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm mb-2 text-zinc-400">Ім'я Прізвище</label>
                        <input id="name" type="text" required class="w-full bg-zinc-800 border border-violet-700 rounded-2xl px-5 py-4 focus:border-violet-500 outline-none">
                    </div>
                    <div class="grid grid-cols-1 gap-6">
                        <div>
                            <label class="block text-sm mb-2 text-zinc-400">Телефон</label>
                            <input id="phone" type="tel" required class="w-full bg-zinc-800 border border-violet-700 rounded-2xl px-5 py-4 focus:border-violet-500 outline-none">
                        </div>
                        <div>

                            <input id="telegram" type="text" class="w-full bg-zinc-800 border border-violet-700 rounded-2xl px-5 py-4 focus:border-violet-500 outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm mb-2 text-zinc-400">Адреса доставки</label>
                        <textarea id="address" rows="3" required class="w-full bg-zinc-800 border border-violet-700 rounded-3xl px-5 py-4 focus:border-violet-500 outline-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm mb-2 text-zinc-400">Коментар</label>
                        <input id="comment" type="text" class="w-full bg-zinc-800 border border-violet-700 rounded-2xl px-5 py-4 focus:border-violet-500 outline-none">
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-700 hover:to-fuchsia-700 text-white py-6 rounded-3xl text-xl font-semibold">
                        Надіслати замовлення

            </form>
        </div>
    </div>

    </div>

        let cart = [];
        let currentFilter = "all";

        function loadCart() {
            const saved = localStorage.getItem("alcocart");
            if (saved) cart = JSON.parse(saved);
        }

        function saveCart() {
            localStorage.setItem("alcocart", JSON.stringify(cart));
        }

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
            const countStr = count > 0 ? count : "0";
            document.getElementById("cart-count").textContent = countStr;
            document.getElementById("mobile-cart-count").textContent = countStr;
            document.getElementById("floating-count").textContent = countStr;
        }

        function showToast(text) {
            const toast = document.getElementById("toast");
            document.getElementById("toast-text").textContent = text;
            toast.classList.remove("hidden");
            setTimeout(() => toast.classList.add("hidden"), 2800);
        }

        function addToCart(id) {
            const prod = products.find(p => p.id === id);
            if (!prod) return;
            const exist = cart.find(item => item.id === id);
            if (exist) exist.qty = (exist.qty || 1) + 1;
            else cart.push({...prod, qty: 1});
            updateCartCount();
            saveCart();
            showToast(`✅ ${prod.name} додано в кошик`);
        }

        function renderFilters() {
            const cats = ["all", ...new Set(products.map(p => p.cat))];
            let html = `<button onclick="setFilter('all')" class="px-5 py-2.5 rounded-3xl text-sm font-medium whitespace-nowrap ${currentFilter==='all' ? 'bg-violet-600 text-white' : 'bg-zinc-800 hover:bg-zinc-700'}">Всі (${products.length})</button>`;
            cats.forEach(c => {
                if (c !== "all") {
                    const count = products.filter(p => p.cat === c).length;
                    html += `<button onclick="setFilter('${c}')" class="px-5 py-2.5 rounded-3xl text-sm font-medium whitespace-nowrap ${currentFilter===c ? 'bg-violet-600 text-white' : 'bg-zinc-800 hover:bg-zinc-700'}">${c} (${count})</button>`;
                }
            });
            document.getElementById("filters").innerHTML = html;
        }

        function setFilter(cat) {
            currentFilter = cat;
            renderFilters();
            filterProducts();
        }

        function filterProducts() {
            const search = document.getElementById("search-input").value.toLowerCase().trim();
            const sortType = document.getElementById("sort-select").value;

            let filtered = products.filter(p => {
                const matchCat = currentFilter === "all" || p.cat === currentFilter;
                const matchSearch = !search || p.name.toLowerCase().includes(search);
                return matchCat && matchSearch;
            });

            if (sortType === "price-low") filtered.sort((a,b) => a.price - b.price);
            if (sortType === "price-high") filtered.sort((a,b) => b.price - a.price);
            if (sortType === "name") filtered.sort((a,b) => a.name.localeCompare(b.name, 'uk'));

            renderProducts(filtered);
        }

        function renderProducts(filtered) {
            let html = "";
            filtered.forEach(p => {
                html += `
                <div class="product-card rounded-3xl overflow-hidden border border-zinc-800">
                    <img src="${p.img}" class="product-img w-full" alt="${p.name}" loading="lazy" onerror="this.src='https://picsum.photos/id/1015/600/600';">
                    <div class="p-4">
                        <div class="font-semibold text-base leading-tight">${p.name}</div>
                        <div class="text-xs text-zinc-400 mt-1">${p.vol}</div>
                        <div class="flex justify-between items-center mt-6">
                            <div class="text-2xl font-bold">${p.price}<span class="text-sm text-zinc-400 ml-1">грн</span></div>
                            <button onclick="addToCart(${p.id}); event.stopImmediatePropagation()" 
                                    class="bg-violet-600 hover:bg-violet-700 text-white px-5 py-2.5 rounded-2xl text-sm font-semibold transition">
                                В кошик
                            </button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById("products").innerHTML = html || `<p class="col-span-full text-center text-zinc-400 py-12">Нічого не знайдено</p>`;
        }

        function renderCart() {
            let html = "", total = 0;
            cart.forEach((item, i) => {
                const sum = item.price * (item.qty || 1);
                total += sum;
                html += `
                <div class="flex gap-4 bg-zinc-900 p-5 rounded-3xl border border-zinc-800">
                    <img src="${item.img}" class="w-20 h-20 object-contain rounded-2xl" loading="lazy" onerror="this.src='https://picsum.photos/id/1015/300/300';">
                    <div class="flex-1">
                        <div class="font-semibold">${item.name} ${item.vol}</div>
                        <div class="text-violet-400 text-sm">${item.price} грн × ${item.qty || 1}</div>
                    </div>
                    <div class="text-right">
                        <div class="font-bold text-xl">${sum} грн</div>
                        <div class="mt-4 flex items-center gap-3">
                            <button onclick="changeQty(${i}, -1)" class="text-red-400 text-3xl w-8 h-8">-</button>
                            <span class="text-lg w-6 text-center">${item.qty || 1}</span>
                            <button onclick="changeQty(${i}, 1)" class="text-emerald-400 text-3xl w-8 h-8">+</button>
                            <button onclick="removeFromCart(${i})" class="ml-4 text-red-500 text-3xl">×</button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById("cart-items").innerHTML = html || `<p class="text-zinc-400 text-center py-12">Кошик порожній</p>`;
            document.getElementById("total").textContent = total + " грн";
        }

        function changeQty(i, delta) {
            cart[i].qty = (cart[i].qty || 1) + delta;
            if (cart[i].qty < 1) cart.splice(i, 1);
            renderCart();
            updateCartCount();
            saveCart();
        }

        function removeFromCart(i) {
            cart.splice(i, 1);
            renderCart();
            updateCartCount();
            saveCart();
        }

        function showSection(sec) {
            document.getElementById("catalog").classList.add("hidden");
            document.getElementById("cart").classList.add("hidden");
            document.getElementById(sec).classList.remove("hidden");
            if (sec === "cart") renderCart();
        }

        function toggleMobileMenu() {
            document.getElementById("mobile-menu").classList.toggle("hidden");
        }

        function openOrderModal() {
            if (cart.length === 0) return alert("Кошик порожній!");
            document.getElementById("order-modal").classList.remove("hidden");
        }

        function closeOrderModal() {
            document.getElementById("order-modal").classList.add("hidden");
        }

        function submitOrder(e) {
            e.preventDefault();
            const name = document.getElementById("name").value;
            const phone = document.getElementById("phone").value;
            const tg = document.getElementById("telegram").value || "—";
            const address = document.getElementById("address").value;
            const comment = document.getElementById("comment").value || "—";

            let text = `🛒 Нове замовлення!\n\nІм'я: ${name}\nТел: ${phone}\nTelegram: ${tg}\nАдреса: ${address}\nКоментар: ${comment}\n\n`;
            let total = 0;
            cart.forEach(item => {
                const sum = item.price * (item.qty || 1);
                total += sum;
                text += `${item.name} ${item.vol} × ${item.qty || 1} = ${sum} грн\n`;
            });
            text += `\nРазом: ${total} грн`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ chat_id: CHAT_ID, text: text })
            }).catch(() => {});

            document.getElementById("order-modal").classList.add("hidden");
            document.getElementById("success-modal").classList.remove("hidden");
            saveCart();
            updateCartCount();
        }

        function closeSuccessModal() {
            document.getElementById("success-modal").classList.add("hidden");
            showSection("catalog");
        }

        // Закриття модалки по фону
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById("order-modal");
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeOrderModal();
            });
        });

        window.onload = () => {
            loadCart();
            renderFilters();
            filterProducts();
            updateCartCount();
        };
    </script>
</body>
</html>
