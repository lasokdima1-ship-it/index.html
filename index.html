<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АлкоДоставка • Преміум</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            font-family: 'Inter', system_ui, sans-serif; 
            background: #0a0a0a;
        }
        .product-card {
            transition: all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
            background: #111827;
        }
        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 35px -10px rgba(139, 92, 246, 0.3);
        }
        .product-img {
            height: 270px;
            object-fit: contain;
            background: #1f2937;
            padding: 20px;
            border-radius: 20px;
        }
        .hero-bg {
            background: linear-gradient(135deg, #1e1b2e 0%, #0a0a0a 100%);
        }
        .purple-glow {
            text-shadow: 0 0 25px rgba(139, 92, 246, 0.6);
        }
        .toast { 
            animation: toastIn 0.4s ease, toastOut 0.3s 3s forwards; 
        }
        @keyframes toastIn { from { transform: translateY(70px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes toastOut { to { transform: translateY(70px); opacity: 0; } }

        /* Плаваючий кошик для телефону */
        .floating-cart {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 999;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.5);
            font-size: 32px;
        }
        .floating-cart:hover { transform: scale(1.1); }
        .floating-cart .count {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #000;
            color: #c4b5fd;
            font-size: 15px;
            font-weight: 700;
            min-width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #1f2937;
        }
    </style>
</head>

                        <span class="w-6 h-0.5 bg-white rounded"></span>
                        <span class="w-6 h-0.5 bg-white rounded"></span>
                    </button>
                </div>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-zinc-900 border-t border-violet-900 px-5 py-6">

        let cart = [];

        function loadCart() { 
            const saved = localStorage.getItem("alcocart"); 
            if (saved) cart = JSON.parse(saved); 
        }
        function saveCart() { 
            localStorage.setItem("alcocart", JSON.stringify(cart)); 
        }
        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
            document.getElementById("cart-count").textContent = count;
            document.getElementById("mobile-cart-count").textContent = count;
            document.getElementById("floating-count").textContent = count;
        }

        function showToast(text) {
            const toast = document.getElementById("toast");
            document.getElementById("toast-text").innerHTML = text;
            toast.classList.remove("hidden");
            setTimeout(() => toast.classList.add("hidden"), 2800);
        }

        function addToCart(id) {
            const prod = products.find(p => p.id === id);
            const exist = cart.find(item => item.id === id);
            if (exist) exist.qty = (exist.qty || 1) + 1;
            else cart.push({...prod, qty: 1});
            updateCartCount();
            saveCart();
            showToast(`✅ ${prod.name} додано`);
        }

            const address = document.getElementById("address").value.trim();
            const comment = document.getElementById("comment").value.trim() || "—";

            const orderId = "ALKO-" + Math.floor(100000 + Math.random() * 900000);

            let text = `🛒 Нове замовлення #${orderId}\n\n`;
            text += `Ім'я: ${name}\nТел: ${phone}\nTelegram: ${tg}\nАдреса: ${address}\nКоментар: ${comment}\n\n`;
            let total = 0;

            cart.forEach(item => {
                const sum = item.price * (item.qty || 1);
                total += sum;
                text += `${item.name} ${item.vol} × ${item.qty || 1} = ${sum} грн\n`;
            });
            text += `\nРазом: ${total} грн`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ chat_id: CHAT_ID, text: text })
            }).catch(() => {});

            document.getElementById("order-id").textContent = `#${orderId}`;
            document.getElementById("order-modal").classList.add("hidden");
            document.getElementById("success-modal").classList.remove("hidden");

            // Перекидання в Telegram з готовим текстом
            setTimeout(() => {
                const tgLink = `https://t.me/founderAD?text=${encodeURIComponent(text)}`;
                window.location.href = tgLink;
            }, 1200);

            // Кошик не очищаємо
            saveCart();
            updateCartCount();
        }

        function goToCartAfterSuccess() {
            document.getElementById("success-modal").classList.add("hidden");
            showSection("cart");
        }

        function closeSuccessModal() {
            document.getElementById("success-modal").classList.add("hidden");
            showSection("catalog");
        }

        window.onload = () => {
            loadCart();
            renderFilters();
            filterProducts();
            updateCartCount();
        };
    </script>
</body>
</html>
